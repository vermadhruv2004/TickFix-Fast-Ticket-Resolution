<!DOCTYPE html>
<html>
<head>
    <title>Ticket Submitted - TickFix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="{{ url_for('static', filename='tickfix.css') }}" rel="stylesheet">
    <script defer src="{{ url_for('static', filename='tickfix.js') }}"></script>
</head>
<body>
    <div class="tickfix-shell">
        <nav class="tickfix-nav">
            <div class="container py-3 d-flex align-items-center justify-content-between">
                <div class="d-flex align-items-center">
                    <div class="tickfix-logo-mark">
                        <span>Tf</span>
                    </div>
                    <div>
                        <div class="tickfix-nav-title">TickFix</div>
                        <div class="small text-muted" style="color:#9ca3af !important; font-size: 0.7rem;">Ticket submitted</div>
                    </div>
                </div>
                <div class="d-none d-md-flex align-items-center gap-2">
                    <button type="button" class="btn btn-sm btn-outline-light" data-theme-toggle aria-pressed="false">Dark mode</button>
                </div>
            </div>
        </nav>

        <main class="tickfix-main">
            <div class="container tickfix-main-inner">
                <div class="row justify-content-center">
                    <div class="col-lg-5 col-md-7">
                        <div class="tickfix-card text-center">
                            <h2 class="mb-3">Ticket submitted</h2>
                            <p class="text-muted mb-4" style="color:#9ca3af !important; font-size:0.9rem;">
                                Your ticket has been submitted successfully. An agent will pick it from the TickFix queue.
                            </p>
                            <a href="/customer/dashboard" class="btn btn-primary">Go to my tickets</a>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
